<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404</title>
  <style>
    @font-face {
      font-family: 'Faustina';
      src: url('/fonts/static/Faustina-Bold.ttf') format('truetype');
      font-weight: 700;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #fff;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 0.05em;
    }
    .digits {
      display: flex;
      align-items: center;
      gap: 0.05em;
    }
    p {
      font-family: 'Faustina', serif;
      font-size: 1.2rem;
      color: #888;
      margin-top: 1rem;
      letter-spacing: 0.02em;
    }
    span {
      font-size: 20vmin;
      font-weight: 700;
      font-family: 'Faustina', serif;
      line-height: 1;
      color: #000;
    }
    img {
      height: 17vmin;
      width: 17vmin;
      object-fit: contain;
      margin-top: 8px;
      margin-left: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="digits">
      <span>4</span>
      <img src="assets/icon-192.png" alt="0">
      <span>4</span>
    </div>
    <p style="text-align: center;">The content thou hast sought<br>
    is nowhere to be found.</p>
  </div>
</body>
</html>
