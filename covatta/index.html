<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Covatta</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/x-icon" href="../assets/ico.ico">
  <link rel="stylesheet" href="../css/ciessesse.css">
  <style>
    :root {
      --crema: #f9f7d7;
      --carta: #fffdf3;
      --inchiostro: #2b2a1f;
      --oro: #a89968;
      --bordo: #e5dfae;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--crema);
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.5), transparent 45%),
        radial-gradient(circle at 80% 85%, rgba(168,153,104,.10), transparent 50%);
      color: var(--inchiostro);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 50px;
    }

    #etichetta-covatta {
      position: fixed;
      top: 14px;
      right: 18px;
      font-family: 'Helvetica Neue', serif;
      font-size: .8rem;
      letter-spacing: .06em;
      color: var(--oro);
      text-transform: lowercase;
    }

    .dashboard {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: comparsa .6s ease-out;
    }

    @keyframes comparsa {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Saluto + orologio */
    #saluto {
      text-align: center;
    }

    #saluto .testo {
      font-family: 'Helvetica Neue', serif;
      font-size: 1.15rem;
      color: var(--oro);
      margin-bottom: 4px;
    }

    #orologio {
      font-family: 'Helvetica Neue', serif;
      font-size: 3.4rem;
      font-weight: 300;
      letter-spacing: .02em;
      line-height: 1;
    }

    #data {
      font-size: .95rem;
      color: #6b6650;
      margin-top: 6px;
      text-transform: capitalize;
    }

    /* Bottoni piattaforme */
    #piattaforme {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .bottone-piattaforma {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      border-radius: 999px;
      background: var(--carta);
      border: 1px solid var(--bordo);
      color: var(--inchiostro);
      text-decoration: none;
      font-size: .95rem;
      font-weight: 600;
      box-shadow: 0 2px 10px rgba(80,70,30,.05);
      transition: transform .15s ease, box-shadow .15s ease;
      cursor: pointer;
    }

    .bottone-piattaforma:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(80,70,30,.12);
    }

    .bottone-piattaforma .pallino {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: .75rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .linkedin .pallino  { background: #0a66c2; }
    .indeed .pallino    { background: #2164f3; }
    .wellfound .pallino { background: #0b0b0b; }
    .glassdoor .pallino { background: #0caa41; }

    /* Card generica */
    .card {
      width: 100%;
      background: var(--carta);
      border: 1px solid var(--bordo);
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: 0 4px 18px rgba(80, 70, 30, .06);
    }

    /* Citazione — dimensioni/spaziatura originali */
    .blogpost {
      font-family: 'Helvetica Neue', serif;
      font-size: 1.1rem;
    }

    #citazione-marco {
      margin: 0;
      padding-left: 10px;
      border-left: 2px solid #000;
    }

    /* Countdown concerto */
    #countdown-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    #countdown-card .etichetta {
      font-family: 'Helvetica Neue', serif;
      font-size: .95rem;
      color: #6b6650;
    }

    #countdown-card .numero {
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--oro);
    }

    @media (max-width: 600px) {
      #orologio { font-size: 2.4rem; }
      .card { padding: 18px 20px; }
      .dashboard { gap: 24px; }
    }
  </style>
</head>

<body>
  <div id="etichetta-covatta">covatta</div>

  <div class="dashboard">

    <div id="saluto">
      <div class="testo" id="testo-saluto"></div>
      <div id="orologio"></div>
      <div id="data"></div>
    </div>

    <div id="piattaforme">
      <a href="#" class="bottone-piattaforma linkedin" target="_blank" rel="noopener">
        <span class="pallino">in</span> LinkedIn
      </a>
      <a href="#" class="bottone-piattaforma indeed" target="_blank" rel="noopener">
        <span class="pallino">✓</span> Indeed
      </a>
      <a href="#" class="bottone-piattaforma wellfound" target="_blank" rel="noopener">
        <span class="pallino">W</span> Wellfound
      </a>
      <a href="#" class="bottone-piattaforma glassdoor" target="_blank" rel="noopener">
        <span class="pallino">G</span> Glassdoor
      </a>
    </div>

    <div class="card">
      <div class="blogpost">
        <blockquote id="citazione-marco"></blockquote>
      </div>
    </div>

    <div class="card" id="countdown-card">
      <div class="etichetta">Yoko Kanno · Piano Me · Milano</div>
      <div class="numero" id="countdown-numero"></div>
    </div>

  </div>

  <script src="../newtab/js/citazioni.js"></script>
  <script>
    // Citazione del giorno
    const oggi = new Date();
    const giornoAnno = Math.floor((oggi - new Date(oggi.getFullYear(), 0, 0)) / 86400000);
    document.getElementById("citazione-marco").innerText = citazioni[giornoAnno % citazioni.length];

    // Saluto + orologio
    const testoSaluto = document.getElementById("testo-saluto");
    const orologio = document.getElementById("orologio");
    const dataEl = document.getElementById("data");

    function aggiornaOrologio() {
      const now = new Date();
      const h = now.getHours();
      let saluto = "Buonanotte";
      if (h >= 5 && h < 12) saluto = "Buongiorno";
      else if (h >= 12 && h < 18) saluto = "Buon pomeriggio";
      else if (h >= 18 && h < 23) saluto = "Buonasera";
      testoSaluto.textContent = saluto;

      orologio.textContent = now.toLocaleTimeString("it-IT", {hour: "2-digit", minute: "2-digit", second: "2-digit"});
      dataEl.textContent = now.toLocaleDateString("it-IT", {weekday: "long", day: "numeric", month: "long"});
    }
    aggiornaOrologio();
    setInterval(aggiornaOrologio, 1000);

    // Countdown concerto Yoko Kanno (3 nov 2026, Milano)
    const dataConcerto = new Date("2026-11-03T00:00:00");
    const giorniMancanti = Math.ceil((dataConcerto - new Date()) / 86400000);
    document.getElementById("countdown-numero").textContent = giorniMancanti > 0 ? giorniMancanti + " giorni" : "È oggi!";
  </script>
</body>
</html>
