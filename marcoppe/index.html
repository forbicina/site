<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Marcoppe">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/x-icon" href="../assets/ico.ico">
    <link rel="stylesheet" href="../css/ciessesse.css">
    <title>Marcoppe</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
        }

        #bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-color: #000;
            background-image: url('nutino.jpg');
            background-size: auto 100vh;
            background-position: center center;
            background-repeat: no-repeat;
        }

        #mainContainer {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .page {
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.4, 0.0, 0.2, 1),
                        opacity 0.4s cubic-bezier(0.4, 0.0, 0.2, 1) 0.25s;
            overflow: hidden;
        }

        .page.exiting {
            transition: transform 0.4s cubic-bezier(0.4, 0.0, 0.2, 1),
                        opacity 0.15s cubic-bezier(0.4, 0.0, 0.2, 1) !important;
        }

        .page.screen-1 {
            transform: translateY(0);
            opacity: 1;
        }

        /* .page.screen-2 {
            transform: translateY(100%);
            opacity: 0;
        } */

        .blogpost {
            max-width: 800px;
            text-align: center;
            padding: 10px;
        }

        .meteo-container {
            margin: 20px;
        }

        .buttons-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            position: relative;
            margin-bottom: 20px;
        }

        .radar {
            font-size: 15px !important;
            height: 30px !important;
            border-radius: 50% !important;
            width: 30px !important;
        }

        .toggle-btn {
            background: linear-gradient(150deg, #1e1a11 0%, #0e0b07 100%);
            color: #f2e4c8;
            padding: 0;
            border: 1px solid rgba(165, 135, 70, 0.55);
            border-radius: 3px;
            width: 52px;
            height: 52px;
            cursor: pointer;
            font-family: 'PTSerif', Georgia, serif;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
            /* targa in rilievo: ombra esterna + highlight + profondità interna */
            box-shadow:
                3px 3px 8px rgba(0,0,0,0.7),
                -1px -1px 3px rgba(75,60,28,0.25),
                inset 1px 1px 2px rgba(85,68,28,0.2),
                inset -1px -1px 3px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .toggle-btn::before {
            content: none;
        }

        .toggle-btn:hover {
            color: #fff8ee;
            box-shadow:
                4px 4px 10px rgba(0,0,0,0.75),
                -1px -1px 4px rgba(80,64,28,0.3),
                inset 1px 1px 2px rgba(90,72,30,0.22),
                inset -1px -1px 3px rgba(0,0,0,0.55);
        }

        /* stato premuto: la targa si abbassa */
        .toggle-btn.active {
            background: linear-gradient(150deg, #0e0b07 0%, #1a1610 100%);
            color: #fff8ee;
            box-shadow:
                1px 1px 3px rgba(0,0,0,0.8),
                inset 3px 3px 7px rgba(0,0,0,0.7),
                inset -1px -1px 2px rgba(75,60,25,0.18);
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
        }

        .toggle-btn span {
            position: relative;
            z-index: 1;
        }

        .train-btn {
            width: auto;
            height: 30px;
            padding: 0 18px;
            font-size: 11px;
            letter-spacing: 2.5px;
            border-radius: 2px;
            background: linear-gradient(150deg, #1e1a11 0%, #0e0b07 100%);
            border-color: rgba(165, 135, 70, 0.55);
        }

        .train-btn:hover {
            color: #d8b87a;
        }

        .widget-wrapper {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            display: flex;
            justify-content: center;
        }

        .widget-wrapper.show {
            max-height: 600px;
        }

        /* .screen-two-content {
            color: white;
        } */

        .train-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .train-row {
            display: flex;
            gap: 10px;
        }

        /* CRT effect — dentro #bg-layer, non tocca il contenuto */
        #crt-noise {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.35;
            image-rendering: pixelated;
        }

        #crt {
            position: absolute;
            inset: 0;
            pointer-events: none;
            /* Vignette */
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.50) 100%);
            animation: crt-flicker 9s infinite;
        }

        /* Scanline animate: scorrono come il beam CRT */
        #crt::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.18) 0px,
                rgba(0,0,0,0.18) 1px,
                transparent 1px,
                transparent 3px
            );
            animation: scanlines-drift 0.1s steps(2) infinite;
        }

        /* Banda luminosa che scorre */
        #crt::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                transparent 0%,
                rgba(255,255,255,0.03) 50%,
                transparent 100%
            );
            background-size: 100% 180px;
            animation: band-roll 7s linear infinite;
        }

        @keyframes scanlines-drift {
            0%   { background-position: 0 0px; }
            50%  { background-position: 0 1px; }
            100% { background-position: 0 0px; }
        }

        @keyframes crt-flicker {
            0%, 90%, 92%, 95%, 100% { opacity: 1; }
            91%  { opacity: 0.83; }
            93%  { opacity: 0.94; }
            96%  { opacity: 0.87; }
            97%  { opacity: 1; }
        }

        @keyframes band-roll {
            from { background-position: 0 -180px; }
            to   { background-position: 0 100vh; }
        }

        #audio-btn {
            position: fixed;
            top: calc(18px + env(safe-area-inset-top));
            right: calc(18px + env(safe-area-inset-right));
            z-index: 1000;
            width: 38px;
            height: 38px;
            background: linear-gradient(150deg, #1e1a11 0%, #0e0b07 100%);
            border: 1px solid rgba(165, 135, 70, 0.55);
            border-radius: 3px;
            color: #f2e4c8;
            font-size: 17px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                3px 3px 8px rgba(0,0,0,0.7),
                -1px -1px 3px rgba(75,60,28,0.25),
                inset 1px 1px 2px rgba(85,68,28,0.2),
                inset -1px -1px 3px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }

        #audio-btn:active {
            box-shadow:
                1px 1px 3px rgba(0,0,0,0.8),
                inset 3px 3px 7px rgba(0,0,0,0.7),
                inset -1px -1px 2px rgba(75,60,25,0.18);
        }
    </style>
</head>

                    </div>
                    <div id="widgetFirenze" class="widget-wrapper">

                    </div>

                    <!-- Sezione Treni -->
                    <div class="train-section">
                        <div class="train-row">
                            <button class="toggle-btn train-btn" onclick="apriStazione('S02581', 'PADOVA')">
                                <span>Padova</span>
                            </button>
                            <button class="toggle-btn train-btn" onclick="apriStazione('S06421', 'FIRENZE S.M.NOVELLA')">
                                <span>Firenze SMN</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <script>
        // Audio toggle
        const audio = document.getElementById('audio');

        audioBtn.addEventListener('click', () => {

        // CRT noise
        (function () {
            const canvas = document.getElementById('crt-noise');
            const ctx = canvas.getContext('2d');
            // Canvas piccolo per performance: 1/4 risoluzione, CSS lo scala
            const SCALE = 4;

            function resize() {
                canvas.width  = Math.floor(window.innerWidth  / SCALE);
                canvas.height = Math.floor(window.innerHeight / SCALE);
            }
            resize();
            window.addEventListener('resize', resize);

            function drawNoise() {
                const w = canvas.width, h = canvas.height;
                const img = ctx.createImageData(w, h);
                const d = img.data;
                for (let i = 0; i < d.length; i += 4) {
                    const v = (Math.random() * 255) | 0;
                    d[i] = d[i+1] = d[i+2] = v;
                    d[i+3] = 30; // molto sottile
                }
                ctx.putImageData(img, 0, 0);
            }

            drawNoise();
            setInterval(drawNoise, 80); // ~12fps, leggero su mobile
        })();

        function toggleWidget(city) {
            const widgets = {
                pd: document.getElementById('widgetPd'),
                firenze: document.getElementById('widgetFirenze')
            };

            const buttons = {
                pd: document.getElementById('btnPd'),
                firenze: document.getElementById('btnFirenze')
            };

            const isCurrentlyShowing = widgets[city].classList.contains('show');

            // Chiudi tutti i widget e rimuovi active da tutti i bottoni
            Object.values(widgets).forEach(w => w.classList.remove('show'));
            Object.values(buttons).forEach(b => b.classList.remove('active'));

            // Se non era già aperto, aprilo
            if (!isCurrentlyShowing) {
                widgets[city].classList.add('show');
                buttons[city].classList.add('active');
            }
        }

        function apriStazione(codiceStazione, nomeStazione) {
            window.location.href = `http://www.viaggiatreno.it/infomobilitamobile/pages/cercaTreno/cercaTreno.jsp?cod=${codiceStazione}&nome=${encodeURIComponent(nomeStazione)}`;
        }
